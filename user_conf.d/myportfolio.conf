# Only count POST requests toward the rate limit; other methods get an
# empty key, which nginx excludes from limiting entirely.
map $request_method $timeline_post_limit_key {
    POST    $binary_remote_addr;
    default "";
}

# 1 request per minute per client IP for POST /api/timeline_post.
limit_req_zone $timeline_post_limit_key zone=timeline_post:10m rate=1r/m;
limit_req_status 429;

server {
    listen 80;
    server_name varotp.duckdns.org;

    if ($host = varotp.duckdns.org) {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name varotp.duckdns.org;

    # Exact match so only the collection endpoint is rate-limited; the
    # DELETE path /api/timeline_post/<id> is untouched. GET is exempt via
    # the map above (empty key), so only POSTs are throttled.
    location = /api/timeline_post {
        limit_req zone=timeline_post;
        proxy_pass http://myportfolio:5000;
    }

    location / {
        proxy_pass http://myportfolio:5000/;
    }

    ssl_certificate /etc/letsencrypt/live/myportfolio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myportfolio/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/myportfolio/chain.pem;
}