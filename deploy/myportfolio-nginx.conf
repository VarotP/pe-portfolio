# Reverse proxy for the portfolio site.
# Install to /etc/nginx/conf.d/myportfolio.conf
#
# Static files are proxied through to Flask rather than served by nginx:
# the repo lives under a 0700 home directory that the nginx user cannot
# traverse. Serving them directly would need both a chmod and an SELinux
# relabel, which is not worth it at this traffic level.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
    }
}
